name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            extension: ''
          - os: linux
            arch: arm64
            extension: ''
          - os: darwin
            arch: amd64
            extension: ''
          - os: darwin
            arch: arm64
            extension: ''
          - os: windows
            arch: amd64
            extension: '.exe'
          - os: windows
            arch: arm64
            extension: '.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -v -o reconx-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.extension }} ./cmd/reconx/main.go

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: reconx-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.extension }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
